{% extends 'base.html' %}
{% block title %}{{ title }} - 반도체 부품 재고관리{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-header bg-white fw-semibold">
        <i class="bi bi-tools me-2"></i>{{ title }}
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label fw-semibold">장비 코드 <span class="text-danger">*</span></label>
              <input type="text" name="code" class="form-control" value="{{ eq.code if eq else '' }}"
                     {{ 'readonly' if eq }} required placeholder="예: EQ-001">
            </div>
            <div class="col-md-8">
              <label class="form-label fw-semibold">장비명 <span class="text-danger">*</span></label>
              <input type="text" name="name" class="form-control" value="{{ eq.name if eq else '' }}" required placeholder="장비 이름">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">설치 위치</label>
              <input type="text" name="location" class="form-control" value="{{ eq.location if eq else '' }}" placeholder="예: 1공장 A라인">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">상태</label>
              <select name="status" class="form-select">
                {% for s in ['가동중', '점검중', '고장', '대기'] %}
                <option value="{{ s }}" {{ 'selected' if eq and eq.status == s }}>{{ s }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">비고</label>
              <textarea name="note" class="form-control" rows="2" placeholder="추가 메모">{{ eq.note if eq else '' }}</textarea>
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check2 me-1"></i>저장
            </button>
            <a href="{{ url_for('equipment_list') }}" class="btn btn-outline-secondary">취소</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
