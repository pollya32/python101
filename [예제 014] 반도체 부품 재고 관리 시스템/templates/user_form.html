{% extends 'base.html' %}
{% block title %}{{ title }} - 반도체 부품 재고관리{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card">
      <div class="card-header bg-white fw-semibold">
        <i class="bi bi-person me-2"></i>{{ title }}
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label fw-semibold">아이디 <span class="text-danger">*</span></label>
              <input type="text" name="username" class="form-control"
                     value="{{ user.username if user else '' }}"
                     {{ 'readonly' if user }} required placeholder="로그인 아이디">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">
                비밀번호 {% if user %}<small class="text-muted fw-normal">(변경 시에만 입력)</small>{% else %}<span class="text-danger">*</span>{% endif %}
              </label>
              <input type="password" name="password" class="form-control"
                     {{ '' if user else 'required' }} placeholder="비밀번호">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">이름 <span class="text-danger">*</span></label>
              <input type="text" name="name" class="form-control"
                     value="{{ user.name if user else '' }}" required placeholder="실명">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">권한</label>
              <select name="role" class="form-select">
                <option value="user" {{ 'selected' if user and user.role == 'user' }}>일반 사용자</option>
                <option value="admin" {{ 'selected' if user and user.role == 'admin' }}>관리자</option>
              </select>
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check2 me-1"></i>저장
            </button>
            <a href="{{ url_for('users_list') }}" class="btn btn-outline-secondary">취소</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
