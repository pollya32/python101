<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - 반도체 부품 재고관리</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #1a3a5c 0%, #0d6efd 100%); min-height: 100vh;
           display: flex; align-items: center; justify-content: center; }
    .login-card { width: 100%; max-width: 420px; border-radius: 16px; border: none;
                  box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    .login-header { background: #1a3a5c; border-radius: 16px 16px 0 0; padding: 32px; text-align: center; }
    .login-header i { font-size: 48px; color: #7eb8f7; }
    .login-header h1 { color: #fff; font-size: 20px; margin-top: 12px; font-weight: 700; }
    .login-header p { color: rgba(255,255,255,.6); font-size: 13px; margin: 0; }
    .login-body { padding: 32px; }
  </style>
</head>
<body>
<div class="login-card card">
  <div class="login-header">
    <i class="bi bi-cpu-fill"></i>
    <h1>반도체 부품 재고관리</h1>
    <p>Semiconductor Parts Inventory System</p>
  </div>
  <div class="login-body">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} alert-dismissible fade show py-2">
        {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">아이디</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="아이디 입력" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">비밀번호</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="비밀번호 입력" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-2"></i>로그인
      </button>
    </form>
    <p class="text-center text-muted mt-3 mb-0" style="font-size:12px">
      계정 문의는 시스템 관리자에게 연락하세요
    </p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
