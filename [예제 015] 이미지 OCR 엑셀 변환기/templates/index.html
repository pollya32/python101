<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이미지 OCR 엑셀 변환기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }

    h1 {
      font-size: 1.8rem;
      color: #2d3a8c;
      margin-bottom: 6px;
      text-align: center;
    }

    .subtitle {
      color: #6b7ab8;
      font-size: 0.95rem;
      margin-bottom: 28px;
      text-align: center;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(68, 114, 196, 0.12);
      padding: 28px;
      width: 100%;
      max-width: 900px;
      margin-bottom: 20px;
    }

    /* 붙여넣기 존 */
    #paste-zone {
      border: 2.5px dashed #7c9dff;
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #f5f8ff;
      position: relative;
    }

    #paste-zone.dragover {
      background: #e8eeff;
      border-color: #4472C4;
    }

    #paste-zone.has-image {
      padding: 16px;
      border-style: solid;
      border-color: #4472C4;
    }

    .paste-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .paste-hint {
      color: #5a6ea8;
      font-size: 1rem;
      line-height: 1.6;
    }

    .paste-hint strong {
      color: #2d3a8c;
    }

    #preview-img {
      max-width: 100%;
      max-height: 320px;
      border-radius: 8px;
      display: none;
      margin: 0 auto;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }

    .file-input-wrap {
      margin-top: 14px;
    }

    #file-input {
      display: none;
    }

    .btn-file {
      display: inline-block;
      padding: 8px 20px;
      background: #e8eeff;
      color: #2d3a8c;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      border: 1.5px solid #b3c2ff;
      transition: background 0.15s;
    }

    .btn-file:hover { background: #d0dcff; }

    /* 버튼들 */
    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      min-width: 160px;
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn-primary {
      background: linear-gradient(135deg, #4472C4, #2d3a8c);
      color: white;
      box-shadow: 0 4px 12px rgba(68,114,196,0.3);
    }

    .btn-primary:not(:disabled):hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(68,114,196,0.4);
    }

    .btn-success {
      background: linear-gradient(135deg, #1e7e5e, #148a50);
      color: white;
      box-shadow: 0 4px 12px rgba(30,126,94,0.3);
    }

    .btn-success:not(:disabled):hover {
      transform: translateY(-1px);
    }

    .btn-copy {
      background: linear-gradient(135deg, #e67e22, #d35400);
      color: white;
      box-shadow: 0 4px 12px rgba(230,126,34,0.3);
    }

    .btn-copy:not(:disabled):hover {
      transform: translateY(-1px);
    }

    .btn-reset {
      background: #f1f3f7;
      color: #666;
      flex: 0;
      min-width: 100px;
    }

    .btn-reset:hover { background: #e5e8ef; }

    /* 상태 메시지 */
    #status {
      text-align: center;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.95rem;
      margin-top: 14px;
      display: none;
    }

    #status.loading {
      display: block;
      background: #e8f0fe;
      color: #2d3a8c;
    }

    #status.error {
      display: block;
      background: #ffe8e8;
      color: #c0392b;
    }

    #status.success {
      display: block;
      background: #e8f8f0;
      color: #1e7e5e;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2.5px solid #4472C4;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* 결과 테이블 */
    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .result-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #2d3a8c;
    }

    .result-badge {
      background: #e8eeff;
      color: #4472C4;
      font-size: 0.82rem;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 10px;
      border: 1.5px solid #d0d9f0;
    }

    #result-table {
      border-collapse: collapse;
      width: 100%;
      font-size: 0.9rem;
    }

    #result-table th, #result-table td {
      border: 1px solid #d0d9f0;
      padding: 8px 12px;
      min-width: 80px;
      max-width: 240px;
    }

    #result-table th {
      background: #4472C4;
      color: white;
      font-weight: 700;
      text-align: center;
    }

    #result-table td {
      text-align: center;
    }

    #result-table tr:nth-child(even) td {
      background: #f0f4ff;
    }

    #result-table td[contenteditable="true"]:focus {
      outline: 2px solid #4472C4;
      background: #fffde7;
    }

    .edit-hint {
      font-size: 0.8rem;
      color: #999;
      margin-top: 8px;
    }

    /* 복사 완료 토스트 */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #2d3a8c;
      color: white;
      padding: 12px 28px;
      border-radius: 30px;
      font-size: 0.95rem;
      font-weight: 600;
      transition: transform 0.3s ease;
      z-index: 999;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .step-guide {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .step {
      background: white;
      border: 1.5px solid #b3c2ff;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 0.82rem;
      color: #4472C4;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .step-num {
      background: #4472C4;
      color: white;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>

<h1>📸 이미지 OCR 엑셀 변환기</h1>
<p class="subtitle">이미지에서 표/텍스트를 자동 인식하여 엑셀로 변환합니다</p>

<div class="step-guide">
  <div class="step"><span class="step-num">1</span> 이미지 붙여넣기 or 파일 선택</div>
  <div class="step"><span class="step-num">2</span> OCR 인식 버튼 클릭</div>
  <div class="step"><span class="step-num">3</span> 결과 확인 및 편집</div>
  <div class="step"><span class="step-num">4</span> Excel 다운로드 or 클립보드 복사</div>
</div>

<div class="card">
  <!-- 붙여넣기 영역 -->
  <div id="paste-zone" tabindex="0">
    <div id="paste-placeholder">
      <div class="paste-icon">🖼️</div>
      <p class="paste-hint">
        <strong>Ctrl+V</strong>로 클립보드 이미지 붙여넣기<br>
        또는 드래그 앤 드롭 / 파일 선택
      </p>
      <div class="file-input-wrap">
        <label class="btn-file" for="file-input">📂 파일 선택</label>
        <input type="file" id="file-input" accept="image/*" />
      </div>
    </div>
    <img id="preview-img" alt="미리보기" />
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="btn-ocr" disabled>
      🔍 OCR 인식 시작
    </button>
    <button class="btn btn-reset" id="btn-reset">
      🔄 초기화
    </button>
  </div>

  <div id="status"></div>
</div>

<!-- 결과 영역 -->
<div class="card" id="result-card" style="display:none">
  <div class="result-header">
    <span class="result-title">📊 인식 결과</span>
    <span class="result-badge" id="size-badge"></span>
  </div>

  <div class="table-wrap">
    <table id="result-table"></table>
  </div>
  <p class="edit-hint">💡 셀을 클릭하면 직접 편집할 수 있습니다</p>

  <div class="btn-row" style="margin-top: 20px;">
    <button class="btn btn-success" id="btn-download">
      ⬇️ Excel 파일 다운로드
    </button>
    <button class="btn btn-copy" id="btn-copy">
      📋 클립보드 복사 (엑셀에 바로 붙여넣기)
    </button>
  </div>
</div>

<div id="toast">✅ 클립보드에 복사되었습니다! 엑셀에서 Ctrl+V</div>

<script>
  let currentImage = null;
  let tableData = [];

  const pasteZone = document.getElementById('paste-zone');
  const placeholder = document.getElementById('paste-placeholder');
  const previewImg = document.getElementById('preview-img');
  const btnOcr = document.getElementById('btn-ocr');
  const btnReset = document.getElementById('btn-reset');
  const btnDownload = document.getElementById('btn-download');
  const btnCopy = document.getElementById('btn-copy');
  const status = document.getElementById('status');
  const resultCard = document.getElementById('result-card');
  const resultTable = document.getElementById('result-table');
  const sizeBadge = document.getElementById('size-badge');
  const toast = document.getElementById('toast');

  // 전역 붙여넣기 이벤트
  document.addEventListener('paste', handlePaste);

  pasteZone.addEventListener('paste', handlePaste);

  function handlePaste(e) {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const file = item.getAsFile();
        loadImageFile(file);
        return;
      }
    }
  }

  // 파일 선택
  document.getElementById('file-input').addEventListener('change', (e) => {
    if (e.target.files[0]) loadImageFile(e.target.files[0]);
  });

  // 드래그 앤 드롭
  pasteZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    pasteZone.classList.add('dragover');
  });

  pasteZone.addEventListener('dragleave', () => {
    pasteZone.classList.remove('dragover');
  });

  pasteZone.addEventListener('drop', (e) => {
    e.preventDefault();
    pasteZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadImageFile(file);
  });

  // 클릭으로도 파일 선택 가능
  pasteZone.addEventListener('click', (e) => {
    if (e.target === pasteZone || e.target === placeholder || e.target.classList.contains('paste-hint')) {
      document.getElementById('file-input').click();
    }
  });

  function loadImageFile(file) {
    currentImage = file;
    const reader = new FileReader();
    reader.onload = (e) => {
      previewImg.src = e.target.result;
      previewImg.style.display = 'block';
      placeholder.style.display = 'none';
      pasteZone.classList.add('has-image');
      btnOcr.disabled = false;
      hideStatus();
      hideResult();
    };
    reader.readAsDataURL(file);
  }

  // OCR 시작
  btnOcr.addEventListener('click', async () => {
    if (!currentImage) return;

    showStatus('loading', '<span class="spinner"></span> OCR 인식 중... 잠시 기다려 주세요');
    btnOcr.disabled = true;

    try {
      const formData = new FormData();
      formData.append('image', currentImage);

      const res = await fetch('/ocr', {
        method: 'POST',
        body: formData
      });

      const data = await res.json();

      if (!res.ok) {
        showStatus('error', '❌ ' + (data.error || '오류가 발생했습니다'));
        return;
      }

      tableData = data.table;
      renderTable(tableData);
      showStatus('success', `✅ 인식 완료! ${data.rows}행 × ${data.cols}열 데이터를 추출했습니다`);
      resultCard.style.display = 'block';
      resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });

    } catch (err) {
      showStatus('error', '❌ 서버 연결 오류: ' + err.message);
    } finally {
      btnOcr.disabled = false;
    }
  });

  function renderTable(data) {
    resultTable.innerHTML = '';
    if (!data || data.length === 0) return;

    sizeBadge.textContent = `${data.length}행 × ${data[0].length}열`;

    data.forEach((row, rIdx) => {
      const tr = document.createElement('tr');
      row.forEach((cell, cIdx) => {
        const td = document.createElement(rIdx === 0 ? 'th' : 'td');
        td.textContent = cell;
        if (rIdx > 0) {
          td.contentEditable = 'true';
          td.addEventListener('input', () => {
            tableData[rIdx][cIdx] = td.textContent;
          });
        }
        tr.appendChild(td);
      });
      resultTable.appendChild(tr);
    });
  }

  // Excel 다운로드
  btnDownload.addEventListener('click', async () => {
    try {
      const res = await fetch('/download', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ table: tableData })
      });

      if (!res.ok) {
        const err = await res.json();
        showStatus('error', '❌ ' + err.error);
        return;
      }

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'OCR_결과.xlsx';
      a.click();
      URL.revokeObjectURL(url);

    } catch (err) {
      showStatus('error', '❌ 다운로드 오류: ' + err.message);
    }
  });

  // 클립보드 복사 (TSV)
  btnCopy.addEventListener('click', async () => {
    if (!tableData.length) return;

    const tsv = tableData.map(row => row.join('\t')).join('\n');

    try {
      await navigator.clipboard.writeText(tsv);
      showToast();
    } catch {
      // fallback
      const ta = document.createElement('textarea');
      ta.value = tsv;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast();
    }
  });

  function showToast() {
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // 초기화
  btnReset.addEventListener('click', () => {
    currentImage = null;
    tableData = [];
    previewImg.src = '';
    previewImg.style.display = 'none';
    placeholder.style.display = 'block';
    pasteZone.classList.remove('has-image', 'dragover');
    btnOcr.disabled = true;
    document.getElementById('file-input').value = '';
    hideStatus();
    hideResult();
  });

  function showStatus(type, msg) {
    status.className = type;
    status.innerHTML = msg;
    status.style.display = 'block';
  }

  function hideStatus() {
    status.style.display = 'none';
  }

  function hideResult() {
    resultCard.style.display = 'none';
    resultTable.innerHTML = '';
  }
</script>
</body>
</html>
